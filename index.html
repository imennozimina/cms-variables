<head>

<style>
  :root{
    --bg:#523634; --ink:#2f3e46; --paper:#DDC5A2; --line:#1f2e2d; --frame:#301B28;
    --btn:#52958b; --btn-hover:#004d47; --btn-ready:#c96666; --btn-ready-hover:#991a1a;
    --focus:#00c2a8; --muted:#00000055;
  }
  body { font-family: Arial, sans-serif; background-color: var(--bg); color: var(--ink); padding: 20px; gap: 20px; }
  .flex-horiz { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
  .top-toolbar, .btm-toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
  .textAreas { display: grid; grid-template-columns: 1fr; gap: 12px; width: 50%; }
  .textAreas.double { grid-template-columns: 1fr 1fr; }
  .text-wrap { position: relative; }
  .text-wrap.active::after{
    content:"active"; position: absolute; top:6px; right:10px; font-size:12px; color:#000; background:#ffd; padding:2px 6px; border-radius:8px; border:1px solid #00000033;
  }
  textarea {
    width: 100%; height: 300px; border: 2px solid var(--line); border-radius: 5px; padding: 10px;
    background-color: var(--paper); color: var(--line); font-size: 16px; white-space: pre; resize: vertical; outline: none;
  }
  .text-wrap { margin-right: 30px;}
  .text-wrap.active textarea { border-color: var(--focus); box-shadow: 0 0 0 3px #00c2a82a; }
  button { padding: 10px 20px; background-color: var(--btn); color: #000; border: none; border-radius: 5px; cursor: pointer; }
  button:hover { background-color: var(--btn-hover); color: #fff; }
  button.ready { background-color: var(--btn-ready); }
  button.ready:hover { background-color: var(--btn-ready-hover); }
  button.ghost { background: transparent; border: 2px solid var(--btn); color: #fff; }
  button.ghost:hover { background: var(--btn-hover); border-color: var(--btn-hover); }
  button.unredo { background-color: goldenrod; }

  input.custom-text, input.promo-input, input.promo-var {
    border: 2px solid var(--line); border-radius: 5px; padding: 1px 10px; height: 35px;
    background-color: var(--paper); color: var(--line); font-size: 16px; outline: none;
  }
textarea.promo-input.promo-values {
  width: 100%;
  min-height: 42px;
  max-height: 120px;
  resize: vertical;
  line-height: 1.4;

  overflow-wrap: anywhere;

}
  input.promo-var { width: 220px; }

}

#tableContainer table { user-select: none; }

<script>
  // ===================== Shared: currency definitions (ONE source of truth) =====================
  // formatKey must match what formatCurrency() expects (switch cases): '$', '€', 'UZS', '₸', etc.
  const CURRENCY_DEFS = [
    { code:'USD', formatKey:'USD',  label:'USD',     tournamentBtn:'USD',   promoLabel:'USD' },
    { code:'EUR', formatKey:'EUR',  label:'EUR',     tournamentBtn:'EUR',   promoLabel:'EUR' },
    { code:'KZT', formatKey:'KZT',  label:'KZT',     tournamentBtn:'KZT',   promoLabel:'KZT' },
    { code:'AZN', formatKey:'AZN',  label:'AZN',     tournamentBtn:'AZN',   promoLabel:'AZN' },
    { code:'UZS', formatKey:'UZS',label:'UZS',  tournamentBtn:'UZS', promoLabel:'UZS' },
    { code:'INR', formatKey:'INR',label:'INR',         tournamentBtn:'INR', promoLabel:'INR' },
    { code:'BDT', formatKey:'BDT',label:'BDT',         tournamentBtn:'BDT', promoLabel:'BDT' },
    { code:'CLP', formatKey:'CLP',label:'CLP',     tournamentBtn:'CLP', promoLabel:'CLP' },
    { code:'MXN', formatKey:'MXN',label:'MXN',     tournamentBtn:'MXN', promoLabel:'MXN' },
    { code:'CRC', formatKey:'CRC',label:'CRC',     tournamentBtn:'CRC', promoLabel:'CRC' },
    { code:'NIO', formatKey:'NIO',label:'NIO',    tournamentBtn:'NIO', promoLabel:'NIO' },
    { code:'GYD', formatKey:'GYD',label:'GYD',     tournamentBtn:'GYD', promoLabel:'GYD' },
    { code:'GTQ', formatKey:'GTQ',label:'GTQ',     tournamentBtn:'GTQ', promoLabel:'GTQ' },
    { code:'HNL', formatKey:'HNL',label:'HNL',     tournamentBtn:'HNL', promoLabel:'HNL' },
    { code:'BOB', formatKey:'BOB',label:'BOB',    tournamentBtn:'BOB', promoLabel:'BOB' },
    { code:'NGN', formatKey:'NGN',label:'NGN',     tournamentBtn:'NGN', promoLabel:'NGN' },
    { code:'KES', formatKey:'KES',label:'KES',   tournamentBtn:'KES', promoLabel:'KES' },
    { code:'CDF', formatKey:'CDF',label:'CDF',    tournamentBtn:'CDF', promoLabel:'CDF' },
  ];

  // Order for tournament toolbar (buttons) — keep your original order.
  const TOURNAMENT_TOOLBAR_ORDER = ['USD','KZT','AZN','UZS','INR','BDT','CLP','MXN','CRC','NIO','GYD','GTQ','HNL','BOB','NGN','KES','CDF'];

  // Order for promo checkboxes + CSV header — taken from the admin template.
  // IMPORTANT: mapping order is still "how user checked the boxes"; this is only fixed output/CSV order.
  const PROMO_FIXED_ORDER = ['USD','KZT','AZN','UZS','INR','BDT','CLP','MXN','CRC','NIO','GYD','GTQ','HNL','BOB','NGN','KES','CDF'];

  const DEF_BY_CODE = Object.fromEntries(CURRENCY_DEFS.map(d => [d.code, d]));
  const DEF_BY_FORMATKEY = Object.fromEntries(CURRENCY_DEFS.map(d => [d.formatKey, d]));


  // ===================== App mode switching =====================
  const tournamentApp = document.getElementById('tournamentApp');
  const promoApp = document.getElementById('promoApp');
    function updateAppModeUI(){
      const mode = document.querySelector('input[name="appMode"]:checked').value;
      tournamentApp.style.display = mode === 'tournament' ? '' : 'none';
      promoApp.style.display = mode === 'promo' ? '' : 'none';
    }

    document.querySelectorAll('input[name="appMode"]').forEach(r => {
    r.addEventListener('change', updateAppModeUI);
    });

    updateAppModeUI();

  
  // Render tournament currency toolbar from shared defs
  const tournamentToolbar = document.getElementById('tournamentToolbar');
  function renderTournamentToolbar(){
    if (!tournamentToolbar) return;
    tournamentToolbar.innerHTML = '';
    TOURNAMENT_TOOLBAR_ORDER.forEach((code) => {
      const d = DEF_BY_CODE[code];
      if (!d) return;
      const btn = document.createElement('button');
      btn.textContent = d.tournamentBtn;
      btn.addEventListener('click', () => applyCurrency(d.formatKey));
      tournamentToolbar.appendChild(btn);
    });
  }
  renderTournamentToolbar();

// ===================== Tournament app (existing code) =====================
  // Elements
  const areaA = document.getElementById('textAreaA');
  const areaB = document.getElementById('textAreaB');
  const wraps = Array.from(document.querySelectorAll('#areas .text-wrap'));
  const areasBox = document.getElementById('areas');
  const doubleMode = document.getElementById('doubleMode');
  const customTextInput = document.getElementById('customTextInput');
  customTextInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault(); // чтобы не переносило строку
    addCustomText();
  }
});
  const tableContainer = document.getElementById('tableContainer');
  const outputTable = document.getElementById('outputTable');

  // History stacks store BOTH columns
  const undoStack = [];
  const redoStack = [];

  // Active area management
  let activeKey = 'a'; // 'a' or 'b'
  function getActiveArea(){ return activeKey === 'a' ? areaA : areaB; }
  function setActive(key){
    activeKey = key;
    wraps.forEach(w => w.classList.toggle('active', w.dataset.key === key));
  }
  wraps.forEach(w => {
    const key = w.dataset.key;
    const ta = key === 'a' ? areaA : areaB;
    ta.addEventListener('focus', () => setActive(key));
    // click on wrapper sets active too
    w.addEventListener('click', () => { (key==='a'?areaA:areaB).focus(); setActive(key);});
  });

  function saveState(){
    undoStack.push({ a: areaA.value, b: areaB.value, active: activeKey, double: doubleMode.checked });
    if (undoStack.length > 200) undoStack.shift();
    redoStack.length = 0;
  }
  function restoreState(s){
    areaA.value = s.a; areaB.value = s.b; setActive(s.active); doubleMode.checked = s.double; toggleDoubleUI();
  }

  function undo(){
    if (undoStack.length){
      const cur = { a: areaA.value, b: areaB.value, active: activeKey, double: doubleMode.checked };
      const prev = undoStack.pop();
      redoStack.push(cur);
      restoreState(prev);
    }
  }
  function redo(){
    if (redoStack.length){
      const cur = { a: areaA.value, b: areaB.value, active: activeKey, double: doubleMode.checked };
      const next = redoStack.pop();
      undoStack.push(cur);
      restoreState(next);
    }
  }

  // Double UI toggle
  function toggleDoubleUI(){
    const second = wraps.find(w => w.dataset.key === 'b');
    if (doubleMode.checked){
      areasBox.classList.add('double');
      second.style.display = '';
    } else {
      areasBox.classList.remove('double');
      second.style.display = 'none';
      if (activeKey === 'b') setActive('a');
    }
  }
  doubleMode.addEventListener('change', () => { saveState(); toggleDoubleUI(); });

  // Helpers
  function cleanToNumberString(s){ return (s || '').replace(/[^0-9]/g,''); }


  function parseSmartNumber(raw){
  if (!raw) return NaN;

  let s = String(raw)
    .replace(/\u00A0/g, ' ')         // NBSP -> normal space
    .replace(/[^\d.,\s]/g, '')       // оставить цифры, точку, запятую и пробелы
    .trim();

  if (!s) return NaN;

  // убираем пробелы между тысячами
  s = s.replace(/\s+/g, '');

  const commaCount = (s.match(/,/g) || []).length;
  const dotCount = (s.match(/\./g) || []).length;

  // Если есть и точка, и запятая:
  // последний разделитель считаем кандидатом на дробную часть,
  // но только если после него 1–2 цифры.
  if (commaCount && dotCount) {
    const lastComma = s.lastIndexOf(',');
    const lastDot = s.lastIndexOf('.');
    const lastSep = Math.max(lastComma, lastDot);

    const intPart = s.slice(0, lastSep).replace(/[.,]/g, '');
    const fracPart = s.slice(lastSep + 1);

    if (/^\d{1,2}$/.test(fracPart)) {
      return parseFloat(intPart + '.' + fracPart);
    }

    return parseFloat(s.replace(/[.,]/g, ''));
  }

  // Только запятая
  if (commaCount && !dotCount) {
    const parts = s.split(',');

    // 0,5 / 2,5 / 1,25 -> дробные
    if (parts.length === 2 && /^\d{1,2}$/.test(parts[1])) {
      return parseFloat(parts[0] + '.' + parts[1]);
    }

    // 7,500 / 15,000 -> тысячи
    return parseFloat(parts.join(''));
  }

  // Только точка
  if (dotCount && !commaCount) {
    const parts = s.split('.');

    // 0.5 / 2.5 / 1.25 -> дробные
    if (parts.length === 2 && /^\d{1,2}$/.test(parts[1])) {
      return parseFloat(parts[0] + '.' + parts[1]);
    }

    // 7.500 / 15.000 -> тысячи
    return parseFloat(parts.join(''));
  }

  // Только цифры
  return parseFloat(s);
}

function formatNumberSmart(number, useIndian = false){
  const isInteger = Number.isInteger(number);

  let formatted = number.toLocaleString(
    useIndian ? 'en-IN' : 'en-US',
    {
      minimumFractionDigits: 0,
      maximumFractionDigits: isInteger ? 0 : 2
    }
  );

  // 👉 заменяем точку на запятую только если есть дробная часть
  if (!isInteger) {
    formatted = formatted.replace('.', ',');
  }

  return formatted;
}

  function formatWithThousandsStyle(number, style = 'space', useIndian = false){
  const isInteger = Number.isInteger(number);

  // отдельно форматируем целую и дробную часть
  let intFormatted = Math.trunc(number).toLocaleString(
    useIndian ? 'en-IN' : 'en-US'
  );

  if (style === 'space') {
    intFormatted = intFormatted.replace(/,/g, ' ');
  } else if (style === 'dot') {
    intFormatted = intFormatted.replace(/,/g, '.');
  }

  // если число целое — просто вернуть целую часть
  if (isInteger) return intFormatted;

  // если есть дробная часть — добавить её через запятую
  const frac = Math.abs(number % 1)
    .toFixed(2)
    .replace(/^0\./, '')
    .replace(/0+$/, '');

  return frac ? `${intFormatted},${frac}` : intFormatted;
}

  // Formatting functions apply to ACTIVE area only
  function applyCurrency(currency){
    saveState();
    const ta = getActiveArea();
    const lines = ta.value.split('\n');
    const updated = lines.map(line => {
      const trimmed = line.trim();
      if (!trimmed) return '';
      return formatCurrency(trimmed, currency);
    });
    ta.value = updated.join('\n');
  }

  function promoRemoveCustomText(){
      const removeText = (document.getElementById('promoRemoveText')?.value || '').trim();
      if (!removeText) return;

      const rows = Array.from(promoRowsBox.querySelectorAll('.promo-row'));

      rows.forEach(row => {
        const input = row.querySelector('.promo-input');
        if (!input) return;

      input.value = input.value.split(removeText).join('').replace(/\s{2,}/g, ' ').trim();
      });

      promoSetStatus('Текст удалён ✅', 'ok');
    }

  function formatCurrency(value, currency){
  const number = typeof value === 'number' ? value : parseSmartNumber(value);
  if (isNaN(number)) return value;

  switch (currency) {
    case 'EUR':  return `€ ${formatWithThousandsStyle(number, 'space')}`;
    case 'UZS':  return `${formatWithThousandsStyle(number, 'space')} SO’M`;
    case 'KZT':  return `${formatWithThousandsStyle(number, 'space')} ₸`;
    case 'AZN':  return `${formatWithThousandsStyle(number, 'space')} ₼`;
    case 'INR':  return `${formatNumberSmart(number, true)} INR`;
    case 'BDT':  return `${formatNumberSmart(number, true)} BDT`;
    case 'CLP':  return `$ ${formatWithThousandsStyle(number, 'space')}`;
    case 'MXN':  return `$ ${formatWithThousandsStyle(number, 'space')}`;
    case 'CRC':  return `₡ ${formatWithThousandsStyle(number, 'dot')}`;
    case 'NIO':  return `C$ ${formatWithThousandsStyle(number, 'dot')}`;
    case 'GYD':  return `$ ${formatNumberSmart(number)}`;
    case 'GTQ':  return `Q${formatNumberSmart(number)}`;
    case 'HNL':  return `L ${formatNumberSmart(number)}`;
    case 'BOB':  return `Bs ${formatWithThousandsStyle(number, 'dot')}`;
    case 'NGN':  return `₦${formatNumberSmart(number)}`;
    case 'KES':  return `KSH ${formatNumberSmart(number)}`;
    case 'CDF':  return `${formatWithThousandsStyle(number, 'space')} FC`;
    default:     return `$ ${formatWithThousandsStyle(number, 'space')}`;
  }
}

  function promoSanitizeVarName(name){
    // Trim edges, then replace internal spaces / hyphens with underscores
    // Examples: "UFC326 4-10 " -> "UFC326_4_10"
    const trimmed = (name || '').trim();

function promoConvert(){

    const outputKeys = promoGetSelectedCurrencyKeys();
    const mappingKeys = promoGetMappingCurrencyKeys();
    if (!outputKeys.length){
      promoSetStatus('Выбери хотя бы одну валюту (чекбоксами).', 'error');
      return;
    }

    // read rows
    const rows = Array.from(promoRowsBox.querySelectorAll('.promo-row'));
    const data = [];
    for (const r of rows){
      const varEl = r.querySelector('.promo-var');
      const varNameRaw = (varEl?.value || '');
      const varName = promoSanitizeVarName(varNameRaw);
      if (varEl) varEl.value = varName;
      let raw = (r.querySelector('.promo-input')?.value || '').trim();
      const removeText = (document.getElementById('promoRemoveText')?.value || '').trim();
        if (removeText) {
          raw = raw.split(removeText).join('').replace(/\s{2,}/g, ' ').trim();
          r.querySelector('.promo-input').value = raw;
        }

      // если строка содержит табы (вставка из Google Sheets)
      // автоматически превращаем их в /
      if (raw.includes('\t')) {
        raw = raw
      .split('\n')
      .map(line =>
        line.split('\t')
          .map(x => x.trim())
          .filter(Boolean)
          .join(' / ')
      )
      .join('\n');
      }
      if (!varName && !raw) continue; // skip empty row

      const parts = raw ? raw.split('/').map(s => s.trim()) : [];
      const formattedByCurrency = {};

      mappingKeys.forEach((curKey, i) => {
        const part = parts[i] ?? '';
        const parsed = parseSmartNumber(part);

        if (isNaN(parsed)){
        formattedByCurrency[curKey] = '';
        } else {
         formattedByCurrency[curKey] = formatCurrency(part, curKey);
        }
      });

      data.push({ varName, formattedByCurrency });
    }

    promoLast = { outputKeys, data };

    promoRenderOutputTable(outputKeys, data);
    promoSetStatus('Готово ✅', 'ok');
  }

  function promoMultiplyValues(){
  const multiplierRaw = (document.getElementById('promoMultiplier')?.value || '').trim();
  const multiplier = parseFloat(multiplierRaw.replace(',', '.'));

  if (!multiplierRaw || isNaN(multiplier)) {
    promoSetStatus('Введи корректный multiplier.', 'error');
    return;
  }

  const rows = Array.from(promoRowsBox.querySelectorAll('.promo-row'));

  rows.forEach(row => {
    const input = row.querySelector('.promo-input');
    if (!input) return;

    let value = (input.value || '').trim();
    if (!value) return;

    const updated = value
      .split('/')
      .map(part => {
        const trimmed = part.trim();
        if (!trimmed) return '';

        const parsed = parseSmartNumber(trimmed);
        if (isNaN(parsed)) return trimmed;

        const multiplied = parsed * multiplier;

        // форматируем число для отображения в строке до Convert:
        // дробные — с запятой, тысячи — с пробелами
        const formattedNumber = formatWithThousandsStyle(multiplied, 'space');

        // заменяем первую числовую часть в куске
        return trimmed.replace(/[0-9][0-9\s.,]*/, formattedNumber);
      })
      .join(' / ');

    input.value = updated;
  });

  promoSetStatus('Multiplier applied ✅', 'ok');
}

  function promoEnableSheetSelection(){
    // Avoid rebinding
    if (promoOutputTable.dataset.sheetBound === '1') {
      promoClearSheetSelection();
      return;
    }
    promoOutputTable.dataset.sheetBound = '1';

    // Bind copy handler once (so Ctrl/Cmd+C works like in spreadsheets)
    if (!promoCopyListenerBound){
      promoCopyListenerBound = true;
      document.addEventListener('copy', (e) => {
        if (!promoSel) return;
        const text = promoSelectionToTsv();
        if (e.clipboardData){
          e.clipboardData.setData('text/plain', text);
          e.preventDefault();
          promoSetStatus('Скопировано ✅', false);
        }
      });
    }

    // Prevent right-click from dropping our visual selection
    promoOutputTable.addEventListener('contextmenu', (e) => {
      if (!promoSel) return;
      e.preventDefault();
    });


    promoOutputTable.addEventListener('mousedown', (e) => {
      const cell = e.target.closest('td,th');
      if (!cell || !promoOutputTable.contains(cell)) return;

      // prevent native text selection
      e.preventDefault();

      // Column header click
      if (cell.tagName === 'TH' && cell.classList.contains('colhdr')) {
        promoSelectColumn(cell.dataset.col);
        promoIsDragging = false;
        promoDragStart = null;
        return;
      }

      // Row header click
      if (cell.tagName === 'TH' && cell.classList.contains('rowhdr')) {
        promoSelectRow(parseInt(cell.dataset.row, 10));
        promoIsDragging = false;
        promoDragStart = null;
        return;
      }

      // Data cell drag selection
      if (cell.tagName === 'TD') {
        const row = cell.dataset.row;
        const col = cell.dataset.col;
        if (row == null || col == null) return;

        promoIsDragging = true;
        promoDragStart = { row: parseInt(row, 10), col };
        promoSelectRect(promoDragStart.row, promoDragStart.col, promoDragStart.row, promoDragStart.col);
      }
    });

    promoOutputTable.addEventListener('mousemove', (e) => {
      if (!promoIsDragging || !promoDragStart) return;
      const cell = e.target.closest('td');
      if (!cell || !promoOutputTable.contains(cell)) return;

      const row = cell.dataset.row;
      const col = cell.dataset.col;
      if (row == null || col == null) return;

      promoSelectRect(promoDragStart.row, promoDragStart.col, parseInt(row, 10), col);
    });

    window.addEventListener('mouseup', () => {
      promoIsDragging = false;
      promoDragStart = null;
    });

    window.addEventListener('keydown', (e) => {
      if (!promoSel) return;
      const isCopy = (e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C');
      if (!isCopy) return;

      e.preventDefault();
      const text = promoSelectionToTsv();
      promoWriteClipboard(text);
      promoSetStatus('Скопировано ✅', false);
    });
  }

function tournamentSelectRange(r1, r2){
  tournamentClearSheetSelection();
  const start = Math.min(r1, r2);
  const end = Math.max(r1, r2);

    const td = outputTable.querySelector(`td[data-row="${r}"][data-col="0"]`);
    if (td) td.classList.add('sel');
  }

  tournamentSel = { type:'range', r1: start, r2: end };

function tournamentSelectionToText(){
  if (!tournamentSel) return '';

  if (tournamentSel.type === 'all'){
    return Array.from(outputTable.querySelectorAll('td[data-col="0"]'))
      .map(td => td.textContent.trim())
      .filter(Boolean)
      .join('\n');
  }

  if (tournamentSel.type === 'range'){
    const lines = [];
    for (let r = tournamentSel.r1; r <= tournamentSel.r2; r++){
      const td = outputTable.querySelector(`td[data-row="${r}"][data-col="0"]`);
      if (td) lines.push(td.textContent.trim());
    }
    return lines.join('\n');
  }

  return '';
}

async function tournamentWriteClipboard(text){

      await navigator.clipboard.writeText(text);

  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(_) {}
  document.body.removeChild(ta);
}

  function promoColToIndex(col){
    if (col === 'name') return 0;
    const n = parseInt(col, 10);
    return isNaN(n) ? 0 : (n + 1);
  }
  function promoIndexToCol(idx){
    return idx === 0 ? 'name' : String(idx - 1);
  }

  function promoSelectRect(r1, c1, r2, c2){
    promoClearSheetSelection();
    const rr1 = Math.min(r1, r2);
    const rr2 = Math.max(r1, r2);
    const cc1 = Math.min(promoColToIndex(c1), promoColToIndex(c2));
    const cc2 = Math.max(promoColToIndex(c1), promoColToIndex(c2));
    promoSel = { type:'rect', r1: rr1, r2: rr2, c1: cc1, c2: cc2 };

    for (let r = rr1; r <= rr2; r++){
      for (let c = cc1; c <= cc2; c++){
        const colKey = promoIndexToCol(c);
        const td = promoOutputTable.querySelector(`td[data-row="${r}"][data-col="${cssEscape(colKey)}"]`);
        if (td) td.classList.add('sel');
      }
    }
  }

  function promoSelectionToTsv(){
    if (!promoSel) return '';
    if (promoSel.type === 'col'){
      const col = promoSel.col;
      const values = Array.from(promoOutputTable.querySelectorAll(`td[data-col="${cssEscape(String(col))}"]`)).map(td => td.textContent);
      return values.join('\n');
    }
    if (promoSel.type === 'row'){
      const row = promoSel.row;
      const cells = Array.from(promoOutputTable.querySelectorAll(`td[data-row="${row}"]`))
        .sort((a,b) => promoColToIndex(a.dataset.col) - promoColToIndex(b.dataset.col))
        .map(td => td.textContent);
      return cells.join('\t');
    }
    const { r1,r2,c1,c2 } = promoSel;
    const lines = [];
    for (let r = r1; r <= r2; r++){
      const rowCells = [];
      for (let c = c1; c <= c2; c++){
        const colKey = promoIndexToCol(c);
        const td = promoOutputTable.querySelector(`td[data-row="${r}"][data-col="${cssEscape(colKey)}"]`);
        rowCells.push(td ? td.textContent : '');
      }
      lines.push(rowCells.join('\t'));
    }
    return lines.join('\n');
  }

  async function promoWriteClipboard(text){
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
    } catch (_) {}
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta);
  }

  function cssEscape(s){
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/[^a-zA-Z0-9_-]/g, '\\$&');
  }
  
  function promoTableToTsvAll(){
    if (promoTableContainer.style.display === 'none' || !promoOutputTable.rows.length) return '';
    const lines = [];
    for (const tr of Array.from(promoOutputTable.rows)){
      const cells = Array.from(tr.cells).map(td => (td.textContent ?? '').trim());
      lines.push(cells.join('\t'));
    }
    return lines.join('\n');
  }

  function promoCopySelection(){
    // Copy selected cells (if any). If nothing is selected, copy the whole table.
    if (promoTableContainer.style.display === 'none' || !promoOutputTable.rows.length){
      promoSetStatus('Сначала нажми Convert, чтобы появилась таблица.', 'error');
      return;
    }
    const text = promoSel ? promoSelectionToTsv() : promoTableToTsvAll();
    promoWriteClipboard(text);
    promoSetStatus('Скопировано ✅', false);
  }

function promoDownloadCsv(){
    // CSV export in admin-friendly shape: Name + selected currency columns (fixed order)
    if (!promoLast || !promoLast.outputKeys || !promoLast.outputKeys.length){
      promoSetStatus('Сначала нажми Convert, чтобы появилась таблица.', 'error');
      return;
    }

    const { outputKeys, data } = promoLast;

    const header = ['Name', ...outputKeys.map(k => (DEF_BY_FORMATKEY[k]?.code ?? k))];
    const rows = [header];

    for (const r of data){
      const line = [r.varName || ''];
      for (const k of outputKeys){
        line.push(r.formattedByCurrency[k] ?? '');
      }
      rows.push(line);
    }

    // Join rows with newline
    const csv = rows.map(cols => cols.map(csvEscape).join(',')).join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'promo_values.csv';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function csvEscape(value){
    const s = String(value ?? '');
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'
    })[m]);
  }
  function escapeAttr(str){
    return escapeHtml(str).replace(/"/g, '&quot;');
  }

  const HISTORY_KEY = "customTextHistory";
const HISTORY_LIMIT = 10;

function loadCustomHistory(){
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  renderCustomHistory(history);
}

function saveCustomHistory(history){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function addToCustomHistory(text){
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

  history = history.filter(i => i !== text);
  history.unshift(text);

  if(history.length > HISTORY_LIMIT){
    history = history.slice(0,HISTORY_LIMIT);
  }

  saveCustomHistory(history);
  renderCustomHistory(history);
}

function renderCustomHistory(history){
  const container = document.getElementById("customHistory");
  container.innerHTML = "";

  history.forEach((text,i)=>{
    const item = document.createElement("div");
    item.className = "history-item";

    const label = document.createElement("span");
    label.textContent = text;
    label.onclick = ()=> addText(text);

    const del = document.createElement("span");
    del.textContent = "✖";
    del.className = "history-delete";
    del.onclick = (e)=>{
      e.stopPropagation();
      deleteHistoryItem(i);
    };

    item.appendChild(label);
    item.appendChild(del);

    container.appendChild(item);
  });
}

function deleteHistoryItem(index){
  let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  history.splice(index,1);
  saveCustomHistory(history);
  renderCustomHistory(history);
}

function resetCustomHistory(){
  localStorage.removeItem(HISTORY_KEY);
  renderCustomHistory([]);
}

function promoConvertTabsToSlashes(){
  const rows = Array.from(promoRowsBox.querySelectorAll('.promo-row'));

  rows.forEach(row => {
    const input = row.querySelector('.promo-input');
    if (!input) return;

    const value = input.value || '';

    // Меняем только табы между ячейками на слеши
    if (value.includes('\t')) {
      input.value = value
        .split('\n')
        .map(line => line.split('\t').map(x => x.trim()).filter(Boolean).join(' / '))
        .join('\n');
    }
  });

  promoSetStatus('Tab → / готово ✅', 'ok');
}

  // Init promo UI
  promoRenderCurrencyCheckboxes();
  // start with 2 empty rows for convenience
  promoAddRow();
  promoAddRow();
  loadCustomHistory();
</script>
